<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TechZeph · Terminal Portfolio</title>
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/terminal.css" />
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

<!--BUTTONS NAVBAR-->
<header class="nav">
  <button data-cmd="home">Home</button>

  <div class="dropdown">
    <button class="dropdown-btn">Projects</button>
    <div class="dropdown-content">
      <a href="https://github.com/TechZeph/media-bias-monitor" target="_blank">
        Media Bias Monitor (Repo)
      </a>
      <a href="/projects/media-bias-monitor/todo.html">
        Media Bias Monitor – TODO Page
      </a>
    </div>
  </div>

  <button data-cmd="github">GitHub</button>
  <button data-cmd="cv">Download CV</button>
</header>


  <main id="terminal-app" role="application" aria-label="Terminal UI">
    <section id="terminal" class="terminal" tabindex="0" aria-live="polite">
      <div id="terminal-output" class="terminal-output" role="log"></div>
      <form id="terminal-form" class="terminal-input-row" autocomplete="off">
        <span class="prompt">&gt;</span>
        <input id="terminal-input" name="cmd" type="text" spellcheck="false" autocapitalize="none" aria-label="Terminal command input" />
      </form>
    </section>
  </main>

  <script type="module" src="scripts/app.init.js"></script>
</body>
</html>
