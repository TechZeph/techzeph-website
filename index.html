<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Matrix Terminal UI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="terminal-root" role="application" aria-label="Matrix terminal">
    <div class="terminal-vignette"></div>

    <header class="term-header" aria-hidden="false">
      <div class="brand">matrix•ui</div>
      <div class="meta">mobile & desktop — monospace</div>
    </header>

    <section id="term" class="terminal" tabindex="0" aria-live="polite">
      <div class="term-output" id="term-output" aria-hidden="false">
        <div class="line">Welcome — type <kbd>help</kbd> and press Enter.</div>
        <!-- dynamic lines will be appended here -->
      </div>

      <form id="term-form" class="term-input-row" autocomplete="off" role="search">
        <label for="cmd" class="sr-only">Terminal input</label>
        <span class="prompt">&gt;</span>
        <input id="cmd" name="cmd" class="cmd" inputmode="text" spellcheck="false"
               placeholder="Type a command..." aria-label="Command input" />
      </form>
    </section>

    <div class="term-footer" aria-hidden="true">
      <small>Matrix theme • Responsive • Accessible</small>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
