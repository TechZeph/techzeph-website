<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechZeph · Neon Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="matrix" aria-hidden="true"></canvas>

    <main class="viewport">
        <section class="terminal" aria-label="Matrix terminal">
            <header class="terminal__header">
                <div>
                    <p class="eyebrow">techzeph systems</p>
                    <h1>Elliot</h1>
                    <p class="tagline">Cyber security + web design student building immersive interfaces.</p>
                </div>
                <div class="status">
                    <span class="status__led" aria-hidden="true"></span>
                    <span class="status__label">online</span>
                </div>
            </header>

            <nav class="helper-bar" aria-label="Quick commands">
                <button type="button" class="helper" data-command="about">About</button>
                <button type="button" class="helper" data-command="projects">Projects</button>
                <button type="button" class="helper" data-command="contact">Contact</button>
                <button type="button" class="helper" data-command="resume">Resume</button>
            </nav>

            <section class="panel" aria-live="polite" aria-atomic="false">
                <header class="panel__tabs" role="tablist" aria-label="Terminal panes">
                    <button class="panel__tab is-active" role="tab" aria-selected="true">console</button>
                    <button class="panel__tab" role="tab" aria-selected="false" disabled>logs</button>
                </header>
                <div id="output" class="console" role="log">
                    <article>
                        <p class="command-line-text">> init</p>
                        <p>Welcome to the neon terminal. Type <span class="command">help</span> or use the quick controls.</p>
                    </article>
                </div>
            </section>

            <form class="command-line" aria-label="Command input" autocomplete="off">
                <label class="sr-only" for="commandInput">Terminal command</label>
                <span class="prompt">&gt;</span>
                <input id="commandInput" name="command" type="text" spellcheck="false" autocapitalize="none" autocomplete="off" placeholder="Type a command e.g. 'about'">
                <span class="ghost-hint" aria-hidden="true">Press Enter to run</span>
            </form>

            <footer class="terminal__footer">
                <div class="links">
                    <a href="#" aria-label="GitHub profile">GitHub</a>
                    <a href="#" aria-label="Email Elliot">Email</a>
                </div>
                <!-- Update location / study focus copy here -->
                <p class="location">Based in the UK · Cyber security & web design student</p>
            </footer>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
